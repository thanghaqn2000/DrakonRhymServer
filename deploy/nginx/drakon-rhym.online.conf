# Nginx site config for DrakonRhymServer (drakon-rhym.online)
#
# Deploy:
#   sudo cp deploy/nginx/drakon-rhym.online.conf /etc/nginx/sites-available/drakon-rhym.online
#   sudo ln -s /etc/nginx/sites-available/drakon-rhym.online /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Issue/renew certificate:
#   sudo certbot --nginx -d drakon-rhym.online -d www.drakon-rhym.online
#
# CORS is intentionally handled by FastAPI (see main.py: expose_headers includes
# X-Pitch-Applied). Do NOT add Access-Control-* headers here — duplicating them
# will break the browser extension.

# Rate-limit zone for /download (5 req/min per client IP).
# This directive lives in the http {} scope. If your distro's main nginx.conf
# already includes `include /etc/nginx/conf.d/*.conf;` BEFORE the server blocks,
# move this line to /etc/nginx/conf.d/drakon-ratelimit.conf instead.
limit_req_zone $binary_remote_addr zone=drakon_download:10m rate=5r/m;

# --- HTTP: ACME challenge + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name drakon-rhym.online www.drakon-rhym.online;

    # Let's Encrypt HTTP-01 challenge (certbot --webroot or --nginx will use this).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: main service ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name drakon-rhym.online www.drakon-rhym.online;

    # Certbot-managed certificate paths.
    ssl_certificate     /etc/letsencrypt/live/drakon-rhym.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drakon-rhym.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Only query-string traffic; no uploads expected.
    client_max_body_size 1m;

    access_log /var/log/nginx/drakon-rhym.access.log;
    error_log  /var/log/nginx/drakon-rhym.error.log warn;

    # /api/download — long-running, streams MP3 back to the client.
    # (The `/download` route at main.py:367 serves an HTML page and is handled
    # by the catch-all `location /` below with default timeouts.)
    # FastAPI's ffmpeg timeout is 600s; allow headroom for slow clients on the
    # response side, hence proxy_read_timeout 900s. proxy_buffering is off so
    # bytes are forwarded to the client as soon as FileResponse emits them.
    location = /api/download {
        limit_req zone=drakon_download burst=2 nodelay;

        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_connect_timeout   10s;
        proxy_send_timeout      900s;
        proxy_read_timeout      900s;
    }

    # Everything else (/health, /auth, /me, static assets, etc.).
    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
